<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algo Atelier</title>
    <meta name="theme-color" content="#1a73e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Algo Atelier" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">LEETCODE STUDY SPACE</p>
        <h1>Algo Atelier</h1>
        <div class="hero-stats" id="hero-stats"></div>
      </section>

      <section class="toolbar">
        <label class="search">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="問題番号、タイトル、タグで検索" />
        </label>
        <label class="filter">
          <span>Category</span>
          <select id="category-select">
            <option value="all">All</option>
          </select>
        </label>
        <label class="filter">
          <span>Difficulty</span>
          <select id="difficulty-select">
            <option value="all">All</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
            <option value="Unknown">Unknown</option>
          </select>
        </label>
        <label class="filter filter-mode">
          <span>Mode</span>
          <select id="view-mode-select">
            <option value="browse">Browse</option>
            <option value="practice">Practice</option>
            <option value="solve">Solve</option>
            <option value="fundamentals">Fundamentals</option>
          </select>
        </label>
        <div class="toolbar-action">
          <span>Cache</span>
          <button id="clear-cache-button" type="button">キャッシュ削除</button>
        </div>
      </section>
      <p class="toolbar-status" id="cache-status" aria-live="polite"></p>

      <section class="content">
        <aside class="problem-list-panel">
          <div class="panel-heading">
            <h2>Problems</h2>
            <p id="problem-count"></p>
          </div>
          <div class="problem-list" id="problem-list"></div>
        </aside>

        <article class="detail-panel" id="detail-panel">
          <div class="empty-state">
            <p class="empty-kicker">Ready</p>
            <h2>問題を選ぶと詳細を表示します</h2>
            <p>
              カテゴリ、難易度、タグ、そして保存済みの Python 解答を 1 画面で確認できます。
            </p>
          </div>
        </article>
      </section>
    </main>

    <dialog id="clear-cache-modal" class="app-modal" aria-labelledby="clear-cache-modal-title">
      <form method="dialog" class="app-modal-card">
        <h2 id="clear-cache-modal-title">キャッシュを削除しますか？</h2>
        <p>
          Practice/Solve の下書きや自己評価も削除されます。この操作は元に戻せません。
        </p>
        <div class="app-modal-actions">
          <button id="clear-cache-cancel" type="button">キャンセル</button>
          <button id="clear-cache-confirm" type="button" class="accent-button">削除する</button>
        </div>
      </form>
    </dialog>

    <script src="vendor/pyodide/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="assets/app.js" defer></script>
  </body>
</html>
